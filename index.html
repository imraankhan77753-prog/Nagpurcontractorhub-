<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nagpur Contractor Hub</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f3f4f6;
}

header{
  background:#111827;
  color:#fff;
  text-align:center;
  padding:20px;
}

.search-section{
  background:#fff;
  padding:20px;
  text-align:center;
}

.search-box{
  width:90%;
  max-width:600px;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
}

.section-title{
  text-align:center;
  margin:20px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h3{
  margin-bottom:8px;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:8px 12px;
  background:#2563eb;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
}

.form{
  background:#fff;
  max-width:600px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
}

input,select,textarea{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#111827;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.featured{
  border:2px solid gold;
}
</style>
</head>

<body>

<header>
<h1>Nagpur Contractor Hub</h1>
<p>Find Contractors Easily</p>
</header>

<section class="search-section">
<input id="search" class="search-box" placeholder="Search contractor...">
</section>

<h2 class="section-title">Contractor Profiles</h2>
<div class="container" id="list"></div>

<div class="form">
<h2>Add Profile</h2>

<input id="name" placeholder="Name">
<input id="business" placeholder="Business Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<select id="service">
<option value="">Select Service</option>
<option>False Ceiling</option>
<option>POP Work</option>
<option>Interior Design</option>
<option>Painting</option>
</select>

<textarea id="desc" placeholder="Description"></textarea>

<label>
<input type="checkbox" id="featured"> Mark as Featured (Top)
</label>

<button onclick="addProfile()">Submit</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

async function load(){
  list.innerHTML = "";

  const snap = await getDocs(collection(db,"contractors"));

  let data = [];

  snap.forEach(doc=>{
    data.push(doc.data());
  });

  // FEATURED TOP
  data.sort((a,b)=>(b.featured||false)-(a.featured||false));

  data.forEach(d=>{
    list.innerHTML += `
      <div class="card ${d.featured ? 'featured' : ''}">
        <h3>${d.business}</h3>
        <p><b>Name:</b> ${d.name}</p>
        <p><b>Service:</b> ${d.service}</p>
        <p><b>Location:</b> ${d.location}</p>
        <p><b>Phone:</b> ${d.phone}</p>
        <p>${d.desc}</p>

        <a class="btn" href="tel:${d.phone}">Call Now</a>
      </div>
    `;
  });
}

window.addProfile = async function(){

  const name = document.getElementById("name").value;
  const business = document.getElementById("business").value;
  const phone = document.getElementById("phone").value;
  const location = document.getElementById("location").value;
  const service = document.getElementById("service").value;
  const desc = document.getElementById("desc").value;
  const featured = document.getElementById("featured").checked;

  if(!name || !business || !phone){
    alert("Fill all required fields");
    return;
  }

  await addDoc(collection(db,"contractors"),{
    name,
    business,
    phone,
    location,
    service,
    desc,
    featured
  });

  alert("Profile Added");

  load();
}

document.getElementById("search").addEventListener("input",(e)=>{
  let val = e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

load();
</script>

</body>
</html>
